[package]
name = "stryke-office"
version = "0.2.0"
description = "Office + image document I/O for stryke. Read+write Excel/Calc (xlsx/ods), Word/Writer (docx/odt), PowerPoint/Impress (pptx/odp), PDF, and a full PIL-style image surface (open/save/crop/resize/convert/paste/draw across png/jpeg/gif/bmp/webp/tiff) — all native Rust, no LibreOffice/soffice subprocess. cdylib loaded on first `use Office`."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-office"
edition = "2026"

